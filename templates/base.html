<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psk. Sibel Domdomoğulları</title>
    
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* --- AKICILIK (SCROLL) AYARLARI --- */
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        
        :root {
            --bg-color: #f4f1ea;
            --text-color: #2c3e50;
            --accent-color: #8f9779;
            --link-hover: #79aba1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- HEADER --- */
        header {
            position: fixed; 
            top: 0; left: 0; width: 100%; 
            padding: 15px 50px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 999; 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .brand-container { 
            text-decoration: none;
            display: flex; flex-direction: column; align-items: flex-start; 
            gap: 5px;
        }
        .logo-ust {
            font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 3px; 
            color: #888; text-transform: uppercase;
        }
        .logo-isim {
            font-family: 'Allura', cursive; font-size: 2.4rem; color: #79aba1; 
            text-shadow: 1px 1px 0px rgba(0,0,0,0.05); display: block;
            line-height: 1.2; margin: 5px 0;
        }
        .logo-alt {
            font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 2px; 
            color: #888; text-transform: uppercase;
        }

        /* MENÜ LİNKLERİ */
        .nav-menu { display: flex; gap: 30px; list-style: none; align-items: center; }
        
        .nav-link {
            text-decoration: none; color: var(--text-color); font-weight: 500;
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            position: relative; padding-bottom: 5px; transition: color 0.3s ease;
        }
        .nav-link:hover { color: var(--link-hover); }
        .nav-link::after {
            content: ''; position: absolute; width: 0; height: 2px; bottom: 0; left: 0;
            background-color: var(--link-hover); transition: width 0.3s;
        }
        .nav-link:hover::after { width: 100%; }

        /* Randevu Butonu */
        .btn-randevu-menu {
            border: 1px solid var(--text-color); padding: 8px 20px; border-radius: 50px;
            transition: 0.3s; font-size: 0.85rem;
        }
        .btn-randevu-menu:hover { background: var(--text-color); color: white !important; }
        .btn-randevu-menu:hover::after { width: 0; }

        .main-content { padding-top: 130px; min-height: 100vh; }

        /* İLETİŞİM BUTONLARI */
        .floating-contact {
            position: fixed; bottom: 30px; right: 30px; z-index: 9999;
            display: flex; flex-direction: column; gap: 15px;
        }
        .contact-btn {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; color: white; font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; position: relative;
        }
        .contact-btn:hover { transform: scale(1.1); color: white; }
        .wp-btn { background-color: #25D366; animation: pulse-green 2s infinite; }
        .call-btn { background-color: #2c3e50; }
        
        .tooltip-text {
            position: absolute; right: 70px; background: rgba(0,0,0,0.8);
            color: white; padding: 5px 10px; border-radius: 5px; font-size: 14px;
            opacity: 0; visibility: hidden; transition: 0.3s; white-space: nowrap; font-family: sans-serif;
        }
        .contact-btn:hover .tooltip-text { opacity: 1; visibility: visible; right: 75px; }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        
        @media (max-width: 768px) {
            header { padding: 10px 20px; }
            .logo-isim { font-size: 2rem; }
            .nav-menu { display: none; }
            .floating-contact { bottom: 20px; right: 20px; }
            .contact-btn { width: 50px; height: 50px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="{% url 'index' %}" class="brand-container">
            <span class="logo-ust">KLİNİK PSİKOLOG</span>
            <span class="logo-isim">Sibel Domdomoğulları</span>
            <span class="logo-alt">DANIŞMANLIK MERKEZİ</span>
        </a>

        <nav>
            <ul class="nav-menu">
                <li><a href="{% url 'index' %}" class="nav-link">Anasayfa</a></li>
                <li><a href="{% url 'about' %}" class="nav-link">Hakkımda</a></li>
                <li><a href="{% url 'blog_list' %}" class="nav-link">Blog</a></li> 
                <li><a href="{% url 'appointment' %}" class="nav-link btn-randevu-menu">Randevu Al</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <div class="floating-contact">
        <a href="tel:+905555555555" class="contact-btn call-btn">
            <i class="fas fa-phone-alt"></i>
            <span class="tooltip-text">Hemen Ara</span>
        </a>
        <a href="https://wa.me/05462268554?text=Merhaba" class="contact-btn wp-btn" target="_blank">
            <i class="fab fa-whatsapp"></i>
            <span class="tooltip-text">WhatsApp'tan Yaz</span>
        </a>
    </div>

</body>
</html>
